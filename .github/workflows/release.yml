name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          ruff check .
          ruff format . --check
          mypy src/
          pytest -v

      - name: Generate changelog
        id: changelog
        run: |
          python3 .github/scripts/gen_changelog.py | tee /tmp/changelog.md
          DELIM=$(dd if=/dev/urandom bs=16 count=1 2>/dev/null | base64 | tr -d '=+/')
          echo "body<<$DELIM" >> "$GITHUB_OUTPUT"
          cat /tmp/changelog.md >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
