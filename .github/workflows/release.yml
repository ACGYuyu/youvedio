name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          ruff check .
          ruff format . --check
          mypy src/
          pytest -v

      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            export RANGE="HEAD"
          else
            export RANGE="$PREV..HEAD"
          fi
          python3 <<'PYEOF'
import re, subprocess, os

range = os.environ["RANGE"]
r = subprocess.run(["git", "log", "--format=%s", range], capture_output=True, text=True)
commits = [l.strip() for l in r.stdout.split("\n") if l.strip()]

sections = {
    "feat": "Features",
    "fix": "Bug Fixes",
    "refactor": "Refactoring",
    "docs": "Documentation",
    "test": "Tests",
    "ci": "CI / Chore",
    "chore": "CI / Chore",
}
order = ["feat", "fix", "refactor", "docs", "test", "ci", "chore"]
grouped = {}

for line in commits:
    for prefix in order:
        if line.startswith(prefix + "(") or line.startswith(prefix + ":"):
            grouped.setdefault(prefix, []).append(line)
            break
    else:
        grouped.setdefault("other", []).append(line)

lines = ["## What's Changed\n"]
for prefix in order:
    if prefix not in grouped:
        continue
    lines.append(f"### {sections[prefix]}")
    for msg in grouped[prefix]:
        clean = re.sub(r"^[^(:]+(\([^)]+\))?:\s*", "", msg).capitalize()
        lines.append(f"- {clean}")
    lines.append("")

if "other" in grouped:
    lines.append("### Other")
    for msg in grouped["other"]:
        lines.append(f"- {msg}")
    lines.append("")

with open("/tmp/changelog.md", "w") as f:
    f.write("\n".join(lines).strip())
PYEOF
          DELIM=$(dd if=/dev/urandom bs=16 count=1 2>/dev/null | base64 | tr -d '=+/')
          echo "body<<$DELIM" >> "$GITHUB_OUTPUT"
          cat /tmp/changelog.md >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
