<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouVedio - 种子/磁力搜索</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 class="logo">YouVedio</h1>
      <p class="subtitle">多语言种子 / 磁力搜索引擎</p>
    </header>

    <form class="search-form" id="searchForm">
      <div class="search-box">
        <input type="text" name="q" id="q" placeholder="输入动漫/剧集名称..." autofocus>
        <button type="submit">搜索</button>
      </div>
      <div class="search-options">
        <label class="ai-toggle">
          <input type="checkbox" id="aiEnhanced" checked>
          <span class="toggle-slider"></span>
          <span class="toggle-label">AI 增强</span>
        </label>
        <div class="lang-tags">
          <span>中文</span>
          <span>English</span>
          <span>日本語</span>
        </div>
      </div>
    </form>

    <!-- Progress section (visible during search) -->
    <div id="progressSection" class="progress-section hidden">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-info">
        <span id="progressText">准备中...</span>
        <button class="log-toggle" id="logToggle">查看日志</button>
      </div>
      <div class="log-container hidden" id="logContainer">
        <div class="log-list" id="logList"></div>
      </div>
    </div>

    <div id="results" class="hidden">
      <div class="results-meta">
        <span id="resultsMeta"></span>
        <div class="group-toggle">
          <button class="group-btn active" data-group="season" id="groupBySeason">按季</button>
          <button class="group-btn" data-group="subgroup" id="groupBySubgroup">按字幕组</button>
        </div>
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="tab-content" id="tabContent"></div>
    </div>

    <div id="noResults" class="no-results hidden">
      <p>未找到相关结果</p>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <script>
    const form = document.getElementById('searchForm');
    const input = document.getElementById('q');
    const resultsDiv = document.getElementById('results');
    const noResults = document.getElementById('noResults');
    const errorDiv = document.getElementById('error');
    const tabs = document.getElementById('tabs');
    const tabContent = document.getElementById('tabContent');
    const resultsMeta = document.getElementById('resultsMeta');
    const aiEnhanced = document.getElementById('aiEnhanced');
    let currentGroupBy = 'season';
    let lastSearchData = null;

    // ---- Progress & Log ----
    const progressSection = document.getElementById('progressSection');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const logToggle = document.getElementById('logToggle');
    const logContainer = document.getElementById('logContainer');
    const logList = document.getElementById('logList');

    logToggle.addEventListener('click', () => {
      logContainer.classList.toggle('hidden');
      logToggle.textContent = logContainer.classList.contains('hidden') ? '查看日志' : '隐藏日志';
    });

    function addLog(site, status, detail) {
      const item = document.createElement('div');
      item.className = 'log-item log-' + status;
      const time = new Date().toLocaleTimeString();
      const icon = status === 'ok' ? '✅' : status === 'fail' ? '❌' : '🔄';
      item.textContent = time + ' ' + icon + ' ' + site + (detail ? ' — ' + detail : '');
      logList.appendChild(item);
      logList.scrollTop = logList.scrollHeight;
    }

    function resetProgress(total) {
      progressSection.classList.remove('hidden');
      progressFill.style.width = '0%';
      progressText.textContent = '0 / ' + total + ' 站';
      logList.innerHTML = '';
    }

    function updateProgress(completed, total, text) {
      const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
      progressFill.style.width = Math.min(pct, 100) + '%';
      progressText.textContent = text || (completed + ' / ' + total + ' 站');
    }

    // ---- Group toggle (re-fetches with new group_by) ----
    function reSearch(gb) {
      if (!lastSearchData || !lastSearchData.keyword) return;
      currentGroupBy = gb;
      const q = lastSearchData.keyword;
      const ai = aiEnhanced.checked;
      progressSection.classList.remove('hidden');
      progressSection.classList.add('shown');
      resetProgress(1);
      updateProgress(0, 1, '切换分组...');
      fetch('/api/search?q=' + encodeURIComponent(q) + '&ai_enhanced=' + ai + '&group_by=' + gb)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          progressSection.classList.add('hidden');
          progressSection.classList.remove('shown');
          lastSearchData = data;
          if (data.total === 0) { noResults.classList.remove('hidden'); return; }
          renderResults(data);
        });
    }

    document.getElementById('groupBySeason').addEventListener('click', function() {
      if (currentGroupBy !== 'season') reSearch('season');
    });

    document.getElementById('groupBySubgroup').addEventListener('click', function() {
      if (currentGroupBy !== 'subgroup') reSearch('subgroup');
    });

    // ---- Search (SSE) ----
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;

      resultsDiv.classList.add('hidden');
      noResults.classList.add('hidden');
      errorDiv.classList.add('hidden');
      progressSection.classList.add('hidden');

      const ai = aiEnhanced.checked;
      const gb = currentGroupBy;
      const url = '/api/search/stream?q=' + encodeURIComponent(q) + '&ai_enhanced=' + ai + '&group_by=' + gb;

      // Fallback: use regular fetch if SSE doesn't work
      try {
        const eventSource = new EventSource(url);
        let sseFailed = false;

        eventSource.addEventListener('progress', (event) => {
          const data = JSON.parse(event.data);
          if (!progressSection.classList.contains('shown')) {
            progressSection.classList.remove('hidden');
            progressSection.classList.add('shown');
            const total = (data.total || 1) * (data.total_queries || 1);
            resetProgress(total);
          }
          if (data.status === 'fetching') {
            addLog(data.site, 'fetching', '');
            updateProgress(data.completed, data.total, '搜索 ' + data.site + '...');
          } else if (data.status === 'ok') {
            addLog(data.site, 'ok', data.results + ' 条结果');
            updateProgress(data.completed, data.total, data.completed + '/' + data.total + ' 站');
          } else if (data.status === 'fail') {
            addLog(data.site, 'fail', data.error || '失败');
            updateProgress(data.completed, data.total, data.completed + '/' + data.total + ' 站');
          }
        });

        eventSource.addEventListener('result', (event) => {
          eventSource.close();
      progressSection.classList.add('hidden');
      lastSearchData = null;
          progressSection.classList.remove('shown');
          lastSearchData = JSON.parse(event.data);
          if (lastSearchData.error) {
            errorDiv.textContent = lastSearchData.error;
            errorDiv.classList.remove('hidden');
            return;
          }
          if (lastSearchData.total === 0) {
            noResults.classList.remove('hidden');
            return;
          }
          renderResults(lastSearchData);
        });

        eventSource.addEventListener('error', () => {
          if (eventSource) eventSource.close();
          if (!sseFailed) {
            sseFailed = true;
            fallbackSearch(q, ai, gb);
          }
        });

        setTimeout(() => {
          if (progressSection.classList.contains('hidden')) {
            fallbackSearch(q, ai, gb);
          }
        }, 3000);

      } catch (err) {
        fallbackSearch(q, ai, gb);
      }
    });

    async function fallbackSearch(q, ai, gb) {
      // Show progress bar instead of spinner for fallback too
      if (!progressSection.classList.contains('shown')) {
        progressSection.classList.remove('hidden');
        progressSection.classList.add('shown');
        resetProgress(1);
      }
      updateProgress(0, 1, '正在搜索...');
      addLog('request', 'fetching', '');
      try {
        const resp = await fetch('/api/search?q=' + encodeURIComponent(q) + '&ai_enhanced=' + ai + '&group_by=' + gb);
        lastSearchData = await resp.json();
        progressSection.classList.add('hidden');
        progressSection.classList.remove('shown');
        addLog('request', 'ok', lastSearchData.total + ' 条结果');
        if (lastSearchData.error) { errorDiv.textContent = lastSearchData.error; errorDiv.classList.remove('hidden'); return; }
        if (lastSearchData.total === 0) { noResults.classList.remove('hidden'); return; }
        renderResults(lastSearchData);
      } catch (err) {
        progressSection.classList.add('hidden');
        progressSection.classList.remove('shown');
        errorDiv.textContent = '请求失败: ' + err.message;
        errorDiv.classList.remove('hidden');
      }
    }

    function renderResults(data) {
      resultsDiv.classList.remove('hidden');
      var meta = '找到 ' + data.total + ' 个结果';
      if (data.sites_success !== undefined) {
        meta += ' | ' + data.sites_success + '/' + (data.sites_success + data.sites_failed) + ' 站成功';
      }
      document.getElementById('resultsMeta').textContent = meta;

      tabs.innerHTML = '';
      tabContent.innerHTML = '';

      var keys = Object.keys(data.seasons);
      if (keys.length === 0) { tabContent.innerHTML = '<div class="empty">暂无分类数据</div>'; return; }

      if (currentGroupBy === 'subgroup') {
        renderSubgroupTabs(data);
      } else {
        renderSeasonTabs(data);
      }
    }

    function renderSeasonTabs(data) {
      var keys = Object.keys(data.seasons);
      var unclassKey = '_unclassified';
      var hasUnclass = keys.includes(unclassKey);
      var normalKeys = keys.filter(function(k) { return k !== unclassKey; });
      var allKeys = [].concat(normalKeys);
      if (hasUnclass) allKeys.push(unclassKey);

      allKeys.forEach(function(key, idx) {
        var btn = document.createElement('button');
        btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
        btn.textContent = key === unclassKey ? '未分类' : key;
        btn.dataset.tabKey = key;
        btn.addEventListener('click', function() { switchTab(key, data.seasons); });
        tabs.appendChild(btn);
      });
      switchTab(allKeys[0], data.seasons);
    }

    function renderSubgroupTabs(data) {
      var keys = Object.keys(data.seasons);
      keys.forEach(function(sg, idx) {
        var btn = document.createElement('button');
        btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
        btn.textContent = sg === '_unknown' ? '未知组' : sg;
        btn.dataset.tabKey = sg;
        btn.addEventListener('click', function() { renderSubgroupDetail(sg, data.seasons); });
        tabs.appendChild(btn);
      });
      if (keys.length > 0) renderSubgroupDetail(keys[0], data.seasons);
    }

    function renderSubgroupDetail(sg, seasons) {
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tabKey === sg);
      });
      var seasonData = seasons[sg] || {};
      var html = '';
      var seasonKeys = Object.keys(seasonData);
      if (seasonKeys.length === 0) { tabContent.innerHTML = '<div class="empty">无数据</div>'; return; }

      seasonKeys.forEach(function(sk) {
        var label = sk === '_unclassified' ? '未分类' : sk;
        html += '<h3 class="quality-header">' + escapeHtml(label) + '</h3>';
        var qualityMap = seasonData[sk];
        Object.keys(qualityMap).forEach(function(q) {
          html += '<div class="result-list"><div class="result-list-label">' + escapeHtml(q) + '</div>';
          qualityMap[q].forEach(function(item) { html += renderCard(item); });
          html += '</div>';
        });
      });
      tabContent.innerHTML = html;
    }

    function switchTab(tabKey, seasons) {
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tabKey === tabKey);
      });
      var qualityMap = seasons[tabKey] || {};
      var html = '';
      var qKeys = Object.keys(qualityMap);
      if (qKeys.length === 0) { html = '<div class="empty">无结果</div>'; }
      else {
        qKeys.forEach(function(q) {
          html += '<h3 class="quality-header">' + escapeHtml(q) + '</h3><div class="result-list">';
          qualityMap[q].forEach(function(item) { html += renderCard(item); });
          html += '</div>';
        });
      }
      tabContent.innerHTML = html;
    }

    function renderCard(item) {
      var tags = [item.quality, item.source_type, item.subgroup].filter(Boolean).join(' ');
      var tagHtml = tags ? '<span class="tags">' + escapeHtml(tags) + '</span>' : '';
      var magnet = item.magnet || '';
      var size = item.size || '';
      var seeders = item.seeders != null ? item.seeders + ' S' : '';
      return (
        '<div class="result-card">' +
          '<div class="card-header">' +
            '<span class="card-title">' + escapeHtml(item.title) + '</span>' + tagHtml +
          '</div>' +
          '<div class="card-meta">' +
            '<span class="source">' + escapeHtml(item.source) + '</span>' +
            (size ? '<span class="size">' + escapeHtml(size) + '</span>' : '') +
            (seeders ? '<span class="seeders">' + seeders + '</span>' : '') +
          '</div>' +
          (magnet ? '<div class="card-actions"><button class="magnet-btn" onclick="copyMagnet(\'' + escapeAttr(magnet) + '\')">复制磁力链接</button></div>' : '') +
        '</div>'
      );
    }

    function copyMagnet(magnet) {
      if (!magnet) return;
      navigator.clipboard.writeText(magnet).then(function() { alert('磁力链接已复制到剪贴板'); })
        .catch(function() { window.prompt('手动复制:', magnet); });
    }

    function escapeHtml(text) { var d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
    function escapeAttr(text) { return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    var urlParams = new URLSearchParams(window.location.search);
    var q = urlParams.get('q');
    if (q) { input.value = q; form.dispatchEvent(new Event('submit')); }
  </script>
</body>
</html>
