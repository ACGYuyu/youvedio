<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouVedio - 种子/磁力搜索</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">YouVedio</a>
    <button class="settings-btn" id="settingsBtn">设置</button>
  </nav>

  <div class="container">
    <header>
      <h1 class="logo">YouVedio</h1>
      <p class="subtitle">多语言种子 / 磁力搜索引擎</p>
    </header>

    <form class="search-form" id="searchForm">
      <div class="search-box">
        <input type="text" name="q" id="q" placeholder="输入动漫/剧集名称..." autofocus>
        <button type="submit">搜索</button>
      </div>
      <div class="lang-tags">
        <span>中文</span>
        <span>English</span>
        <span>日本語</span>
      </div>
    </form>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>正在搜索中，请稍候...</p>
    </div>

    <div id="results" class="hidden">
      <div class="results-meta" id="resultsMeta"></div>
      <div class="tabs" id="tabs"></div>
      <div class="tab-content" id="tabContent"></div>
    </div>

    <div id="noResults" class="no-results hidden">
      <p>未找到相关结果</p>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <!-- Settings Dialog -->
  <dialog id="settingsDialog">
    <div class="dialog-content">
      <div class="dialog-header">
        <h2>设置</h2>
      </div>
      <div class="dialog-body">
        <div class="settings-section">
          <h3>🔌 代理配置</h3>
          <label class="toggle-row">
            <span>启用代理</span>
            <input type="checkbox" id="proxyEnabled">
          </label>
          <div class="input-row">
            <label>HTTP 代理</label>
            <input type="text" id="httpProxy" placeholder="http://127.0.0.1:10808">
          </div>
          <div class="input-row">
            <label>HTTPS 代理</label>
            <input type="text" id="httpsProxy" placeholder="http://127.0.0.1:10808">
          </div>
        </div>
        <div class="settings-section">
          <h3>🤖 AI 模型配置</h3>
          <div class="input-row">
            <label>API Key</label>
            <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxx">
          </div>
          <div class="input-row">
            <label>Base URL</label>
            <input type="text" id="baseUrl" placeholder="https://api.deepseek.com/v1">
          </div>
          <div class="input-row">
            <label>模型名称</label>
            <input type="text" id="modelName" placeholder="deepseek-chat">
          </div>
        </div>
      </div>
      <div class="dialog-footer">
        <span class="save-status" id="saveStatus"></span>
        <button class="btn-cancel" id="cancelSettings">取消</button>
        <button class="btn-primary" id="saveSettings">保存</button>
      </div>
    </div>
  </dialog>

  <script>
    const form = document.getElementById('searchForm');
    const input = document.getElementById('q');
    const loading = document.getElementById('loading');
    const resultsDiv = document.getElementById('results');
    const noResults = document.getElementById('noResults');
    const errorDiv = document.getElementById('error');
    const tabs = document.getElementById('tabs');
    const tabContent = document.getElementById('tabContent');
    const resultsMeta = document.getElementById('resultsMeta');

    // ---- Settings ----
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsDialog = document.getElementById('settingsDialog');
    const cancelBtn = document.getElementById('cancelSettings');
    const saveBtn = document.getElementById('saveSettings');
    const saveStatus = document.getElementById('saveStatus');

    const proxyEnabled = document.getElementById('proxyEnabled');
    const httpProxy = document.getElementById('httpProxy');
    const httpsProxy = document.getElementById('httpsProxy');
    const apiKey = document.getElementById('apiKey');
    const baseUrl = document.getElementById('baseUrl');
    const modelName = document.getElementById('modelName');

    let settingsData = {};

    async function loadSettings() {
      try {
        const resp = await fetch('/api/settings');
        settingsData = await resp.json();
        proxyEnabled.checked = settingsData.proxy_enabled || false;
        httpProxy.value = settingsData.http_proxy || '';
        httpsProxy.value = settingsData.https_proxy || '';
        apiKey.value = '';
        baseUrl.value = settingsData.deepseek_base_url || 'https://api.deepseek.com/v1';
        modelName.value = settingsData.deepseek_model || 'deepseek-chat';
      } catch (e) {
        console.error('Failed to load settings', e);
      }
    }

    settingsBtn.addEventListener('click', () => {
      loadSettings();
      settingsDialog.showModal();
    });

    cancelBtn.addEventListener('click', () => {
      settingsDialog.close();
    });

    settingsDialog.addEventListener('click', (e) => {
      if (e.target === settingsDialog) settingsDialog.close();
    });

    saveBtn.addEventListener('click', async () => {
      const payload = {
        proxy_enabled: proxyEnabled.checked,
        http_proxy: httpProxy.value.trim(),
        https_proxy: httpsProxy.value.trim(),
        deepseek_api_key: apiKey.value.trim(),
        deepseek_base_url: baseUrl.value.trim(),
        deepseek_model: modelName.value.trim(),
      };

      try {
        const resp = await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (data.ok) {
          saveStatus.textContent = '已保存';
          saveStatus.className = 'save-status success';
          setTimeout(() => { saveStatus.className = 'save-status'; }, 2000);
        } else {
          saveStatus.textContent = '保存失败';
          saveStatus.className = 'save-status error';
        }
      } catch (e) {
        saveStatus.textContent = '保存失败: ' + e.message;
        saveStatus.className = 'save-status error';
      }
    });

    // ---- Search ----
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;

      loading.classList.remove('hidden');
      resultsDiv.classList.add('hidden');
      noResults.classList.add('hidden');
      errorDiv.classList.add('hidden');

      try {
        const resp = await fetch('/api/search?q=' + encodeURIComponent(q));
        const data = await resp.json();
        loading.classList.add('hidden');

        if (data.error) {
          errorDiv.textContent = data.error;
          errorDiv.classList.remove('hidden');
          return;
        }

        if (data.total === 0) {
          noResults.classList.remove('hidden');
          return;
        }

        renderResults(data);
      } catch (err) {
        loading.classList.add('hidden');
        errorDiv.textContent = '请求失败: ' + err.message;
        errorDiv.classList.remove('hidden');
      }
    });

    function renderResults(data) {
      resultsDiv.classList.remove('hidden');

      resultsMeta.textContent = '找到 ' + data.total + ' 个结果';
      if (data.sites_success !== undefined) {
        resultsMeta.textContent += ' | ' + data.sites_success + '/' + (data.sites_success + data.sites_failed) + ' 站成功';
      }

      const seasonKeys = Object.keys(data.seasons);
      tabs.innerHTML = '';
      tabContent.innerHTML = '';

      if (seasonKeys.length === 0) {
        tabContent.innerHTML = '<div class="empty">暂无分类数据</div>';
        return;
      }

      const unclassKey = '_unclassified';
      const hasUnclass = seasonKeys.includes(unclassKey);
      const normalKeys = seasonKeys.filter(function(k) { return k !== unclassKey; });
      const allKeys = [].concat(normalKeys);
      if (hasUnclass) allKeys.push(unclassKey);

      allKeys.forEach(function(key, idx) {
        var btn = document.createElement('button');
        btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
        btn.textContent = key === unclassKey ? '未分类' : key;
        btn.dataset.season = key;
        btn.addEventListener('click', function() { switchTab(key, data); });
        tabs.appendChild(btn);
      });

      switchTab(allKeys[0], data);
    }

    function switchTab(activeKey, data) {
      document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.season === activeKey);
      });

      var seasonData = data.seasons[activeKey] || {};
      var html = '';
      var qualityKeys = Object.keys(seasonData);

      if (qualityKeys.length === 0) {
        html = '<div class="empty">该分类无结果</div>';
      } else {
        qualityKeys.forEach(function(q) {
          html += '<h3 class="quality-header">' + escapeHtml(q) + '</h3>';
          html += '<div class="result-list">';
          seasonData[q].forEach(function(item) {
            html += renderCard(item);
          });
          html += '</div>';
        });
      }

      tabContent.innerHTML = html;
    }

    function renderCard(item) {
      var season = item.season ? 'S' + String(item.season).padStart(2, '0') : '';
      var episode = item.episode ? 'E' + String(item.episode).padStart(2, '0') : '';
      var epLabel = (season || episode) ? '[' + season + (episode ? ' ' + episode : '') + ']' : '';
      var tags = [item.quality, item.source_type].filter(Boolean).join(' ');
      var tagHtml = tags ? '<span class="tags">' + escapeHtml(tags) + '</span>' : '';

      var magnet = item.magnet || '';
      var size = item.size || '';
      var seeders = item.seeders != null ? item.seeders + ' S' : '';

      return (
        '<div class="result-card">' +
          '<div class="card-header">' +
            '<span class="card-title">' + escapeHtml(item.title) + '</span>' +
            tagHtml +
          '</div>' +
          '<div class="card-meta">' +
            '<span class="source">' + escapeHtml(item.source) + '</span>' +
            (size ? '<span class="size">' + escapeHtml(size) + '</span>' : '') +
            (seeders ? '<span class="seeders">' + seeders + '</span>' : '') +
          '</div>' +
          (magnet ? '<div class="card-actions"><button class="magnet-btn" onclick="copyMagnet(\'' + escapeAttr(magnet) + '\')">复制磁力链接</button></div>' : '') +
        '</div>'
      );
    }

    function copyMagnet(magnet) {
      if (!magnet) return;
      navigator.clipboard.writeText(magnet).then(function() {
        alert('磁力链接已复制到剪贴板');
      }).catch(function() {
        window.prompt('手动复制:', magnet);
      });
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeAttr(text) {
      return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // Trigger search from URL param
    var urlParams = new URLSearchParams(window.location.search);
    var q = urlParams.get('q');
    if (q) {
      input.value = q;
      form.dispatchEvent(new Event('submit'));
    }
  </script>
</body>
</html>
